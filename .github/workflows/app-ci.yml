name: App CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/workflows/app-ci.yml'
      - '.github/workflows/release-please.yml'
  release:
    types: [published]

jobs:
  lint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install
        working-directory: app/

      - name: Run lint
        run: bun run lint
        working-directory: app/

  build-and-push:
    if: github.event_name == 'release' && startsWith(github.ref_name, 'app-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#app-}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app/
          file: app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasky/app:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tasky/app:latest
            lucasvmigotto/tasky-app:${{ steps.version.outputs.version }}
            lucasvmigotto/tasky-app:latest

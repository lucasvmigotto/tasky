name: API CD

on:
  push:
    tags:
      - "api-*"

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#api-}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasky/api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tasky/api:latest
            ${{ vars.DOCKER_HUB_USERNAME }}/tasky-api:${{ steps.version.outputs.version }}
            ${{ vars.DOCKER_HUB_USERNAME }}/tasky-api:latest

      - name: Build jar
        run: ./gradlew :api:bootJar -x test

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=${{ steps.version.outputs.version }}
          mkdir -p release-artifacts
          cp api/build/libs/*.jar release-artifacts/
          git archive --format=zip -o "release-artifacts/source-${V}.zip" HEAD api/ build.gradle settings.gradle
          gh release create "api-$V" \
            --title "api-v$V" \
            --notes "Release api-v$V" \
            release-artifacts/*

name: CD

on:
  release:
    types: [published]

jobs:
  api:
    if: startsWith(github.ref_name, 'api-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :api:test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#api-}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasky/api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tasky/api:latest
            lucasvmigotto/tasky-api:${{ steps.version.outputs.version }}
            lucasvmigotto/tasky-api:latest

  app:
    if: startsWith(github.ref_name, 'app-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#app-}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: app/
          file: app/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasky/app:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tasky/app:latest
            lucasvmigotto/tasky-app:${{ steps.version.outputs.version }}
            lucasvmigotto/tasky-app:latest

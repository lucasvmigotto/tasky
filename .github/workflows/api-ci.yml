name: API CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :api:test

      - name: Extract version
        id: version
        run: echo "version=$(cat api/build.gradle | grep version | cut -d ' ' -f 3 | sed "s/'//g")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag api-${{ steps.version.outputs.version }}
          git push origin api-${{ steps.version.outputs.version }}

  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(cat api/build.gradle | grep version | cut -d ' ' -f 3 | sed "s/'//g")" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub Container registry
        uses: docker/login-action@v3
        with:
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Log in to Docker Hardened Images Container registry
        uses: docker/login-action@v3
        with:
          registry: dhi.io
          username: ${{ github.actor }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Log in to GitHub Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v3
        with:
          images: |
            ${{ github.repository }}-api
            ghcr.io/${{ github.repository }}-api

      - name: Build and push Docker image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: "."
          file: api/Dockerfile
          push: true
          labels: ${{ steps.meta.outputs.labels }}
          tags: |
            ${{ github.repository }}-api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository }}-api:${{ steps.version.outputs.version }}
            ${{ github.repository }}-api:latest
            ghcr.io/${{ github.repository }}-api:latest

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-name: ghcr.io/${{ github.repository }}-api
          subject-digest: ${{ steps.push.outputs.digest }}

  release-artifact:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: echo "version=$(cat api/build.gradle | grep version | cut -d ' ' -f 3 | sed "s/'//g")" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          V=${{ steps.version.outputs.version }}
          git archive --format=zip -o "source-${V}.zip" HEAD api/ build.gradle settings.gradle
          gh release create "api-$V" --title "api-v$V" --notes "Release api-v$V" "source-${V}.zip"

name: API CI

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "build.gradle"
      - "settings.gradle"
      - "gradle/**"
      - "gradlew"

jobs:
  test-and-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :api:test

      - name: Extract version
        id: version
        run: echo "version=$(cat api/build.gradle | grep version | cut -d ' ' -f 3 | sed "s/'//g")" >> $GITHUB_OUTPUT

      - name: Create and push tag
        run: |
          git tag api-${{ steps.version.outputs.version }}
          git push origin api-${{ steps.version.outputs.version }}

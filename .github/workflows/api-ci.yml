name: API CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'api/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'gradle/**'
      - 'gradlew'
      - '.github/workflows/api-ci.yml'
      - '.github/workflows/release-please.yml'
  release:
    types: [published]

jobs:
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :api:test

  build-and-push:
    if: github.event_name == 'release' && startsWith(github.ref_name, 'api-')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v4

      - name: Run tests
        run: ./gradlew :api:test

      - name: Extract version
        id: version
        run: echo "version=${GITHUB_REF_NAME#api-}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKER_HUB_USER }}
          password: ${{ secrets.DOCKER_HUB_PAT }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/tasky/api:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/tasky/api:latest
            lucasvmigotto/tasky-api:${{ steps.version.outputs.version }}
            lucasvmigotto/tasky-api:latest

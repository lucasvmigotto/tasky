version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    container_name: tasky-api
    ports:
      - "8080:8080"
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-tasky}
      POSTGRES_USER: ${POSTGRES_USER:-tasky}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasky}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRATION_HOURS: ${JWT_EXPIRATION_HOURS:-24}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:5173}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  app:
    build: app/
    container_name: tasky-app
    ports:
      - "5173:8080"
    environment:
      NGINX_ENVSUBST_FILTER: API_UPSTREAM
      API_UPSTREAM: http://api:8080
      VITE_API_URL: http://api:8080
      VITE_DEMO_MODE: "true"
    depends_on:
      - api
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    container_name: tasky-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tasky}
      POSTGRES_USER: ${POSTGRES_USER:-tasky}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tasky}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasky"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  pgdata:
